const{useState,useEffect,useCallback,useRef}=React;

const KEY="pmcc_v4";
function load(){try{return JSON.parse(localStorage.getItem(KEY)||"[]")}catch{return[]}}
function save(d){localStorage.setItem(KEY,JSON.stringify(d))}

function ema(data,n){
  const k=2/(n+1);
  let e=data.slice(0,n).reduce((a,b)=>a+b,0)/n;
  const r=[e];
  for(let i=n;i<data.length;i++){e=data[i]*k+e*(1-k);r.push(e)}
  return r;
}

async function fetchMarket(){
  const url="https://api.allorigins.win/get?url="+encodeURIComponent(
    "https://query1.finance.yahoo.com/v8/finance/chart/QQQ?interval=1d&range=90d"
  );
  const r=await fetch(url);
  const j=await r.json();
  const c=JSON.parse(j.contents).chart.result[0];
  const cl=c.indicators.quote[0].close.filter(Boolean);
  const vl=c.indicators.quote[0].volume.filter(Boolean);
  const cur=cl.at(-1),prev=cl.at(-2),wk=cl.at(-6)||cl[0];
  const lo20=Math.min(...cl.slice(-20));
  const e5=ema(cl,5),e12=ema(cl,12),e20=ema(cl,20),e26=ema(cl,26);
  const mn=e12.at(-1)-e26.at(-1),mp=e12.at(-2)-e26.at(-2);
  const av=vl.slice(-20).reduce((a,b)=>a+b,0)/20;
  return{
    price:cur,daily:(cur-prev)/prev*100,weekly:(cur-wk)/wk*100,
    rally:(cur-lo20)/lo20*100,emaDist:(e5.at(-1)-e20.at(-1))/e20.at(-1)*100,
    macd:mn,macdExp:mn>mp,volRatio:vl.at(-1)/av,
    ema20val:e20.at(-1),ema5val:e5.at(-1),
    closes:cl.slice(-30)
  };
}

function evalInd(md){
  const items=[
    {id:"wk",name:"週漲幅",     val:`${md.weekly.toFixed(1)}%`,  fired:md.weekly>3},
    {id:"em",name:"EMA 距離",   val:`${md.emaDist.toFixed(1)}%`, fired:md.emaDist>2.5},
    {id:"rl",name:"距近期低點", val:`+${md.rally.toFixed(1)}%`,  fired:md.rally>12},
    {id:"mc",name:"MACD",       val:md.macdExp&&md.macd>0?"強勢擴張":md.macd>0?"偏多":"偏空",fired:md.macdExp&&md.macd>0},
    {id:"vl",name:"成交量比",   val:`${md.volRatio.toFixed(2)}x`,fired:md.volRatio>1.2},
  ];
  const f=items.filter(i=>i.fired).length;
  return{items,fired:f,mode:f>=3?"surge":f>=1?"sideways":"bearish"};
}

// ── CLAUDE via cors-anywhere proxy ────────────────────────────────────────────
async function askClaude(md,ind,positions,ctx,isEmptyPortfolio){
  const pos=positions.length===0?"目前無持倉（空倉狀態）。":positions.map(p=>{
    if(p.type==="long"){
      const pnl=(p.current-p.cost)*100*p.qty;
      return `Long LEAPS QQQ ${p.expiry} ${p.strike}C×${p.qty}，成本$${p.cost}，現值$${p.current}，浮盈$${pnl.toFixed(0)}，Delta ${p.delta}`;
    }else{
      const pnl=(p.sell-p.current)*100*p.qty;
      const buf=md?((p.strike-md.price)/md.price*100).toFixed(1):"--";
      return `Short Call QQQ ${p.expiry} ${p.strike}C×${p.qty}，賣出$${p.sell}，現值$${p.current}，浮盈$${pnl.toFixed(0)}，Delta ${p.delta}，緩衝${buf}%`;
    }
  }).join("\n");

  const ml={surge:"急漲",sideways:"橫盤",bearish:"偏空穩定"};
  const hasLeaps=positions.some(p=>p.type==="long");
  const hasShort=positions.some(p=>p.type==="short");

  const entryContext=!hasLeaps?`
【重要：目前空倉，無 Long LEAPS 倉位】
請重點回答：
1. 現在是否適合買入 Long LEAPS？
2. 若適合，建議的行權價範圍和到期日
3. 若不適合，等待什麼條件再進場
`:`【持倉狀態】Long LEAPS${hasShort?"+ Short Call":"（無 Short Call）"}
請重點回答：
1. 現有倉位是否需要調整
2. ${hasShort?"Short Call 是否需要 Roll 或平倉":"是否適合開 Short Call 收租"}
3. 整體操作建議
`;

  const prompt=`今日市場：QQQ $${md.price.toFixed(2)} 今日${md.daily.toFixed(2)}% 週漲${md.weekly.toFixed(2)}%
距低點+${md.rally.toFixed(1)}% EMA距離${md.emaDist.toFixed(1)}% MACD${md.macd.toFixed(2)}(${md.macdExp?"擴張":"收窄"}) 成交量比${md.volRatio.toFixed(2)}x
指標觸發${ind.fired}/5 初步判斷：${ml[ind.mode]}

持倉：
${pos}

${entryContext}
${ctx?`補充資訊：${ctx}`:""}

請給出今日完整判斷，200字以內，不用標題和符號。`;

  // 使用 corsproxy.io 轉發 Anthropic API
  const proxyUrl="https://corsproxy.io/?"+encodeURIComponent("https://api.anthropic.com/v1/messages");

  const res=await fetch(proxyUrl,{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key":"",  // 由 Claude.ai artifact 環境注入
      "anthropic-version":"2023-06-01"
    },
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:1000,
      system:`你是資深期權交易員，專精PMCC策略。

核心原則：
- 急漲時讓LEAPS跑，絕不賣Short Call
- 橫盤才收租，賣Short Call Delta 0.20-0.30
- 偏空保守收租，Delta 0.15-0.20

空倉時的判斷原則：
- 急漲模式：不建議現在買LEAPS，等回調
- 橫盤模式：可以買LEAPS，同時考慮開Short Call
- 偏空模式：可以買LEAPS，等反彈確認再開Short Call
- LEAPS選擇：深度ITM，Delta 0.70-0.80，到期日12-18個月後

風格：直接有力，每個建議說理由。繁體中文，像信任的交易夥伴。`,
      messages:[{role:"user",content:prompt}]
    })
  });

  if(!res.ok){
    // 備用：使用 allorigins 轉發
    const backup="https://api.allorigins.win/raw?url="+encodeURIComponent("https://api.anthropic.com/v1/messages");
    const res2=await fetch(backup,{
      method:"POST",
      headers:{"Content-Type":"application/json","anthropic-version":"2023-06-01"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:1000,
        system:`你是資深期權交易員，專精PMCC策略。核心：急漲讓LEAPS跑；橫盤才收租；偏空保守收租。空倉時判斷是否進場買LEAPS。繁體中文，直接有力。`,
        messages:[{role:"user",content:prompt}]
      })
    });
    const d2=await res2.json();
    return d2.content?.[0]?.text||generateOfflineAnalysis(md,ind,positions,hasLeaps);
  }

  const d=await res.json();
  return d.content?.[0]?.text||generateOfflineAnalysis(md,ind,positions,hasLeaps);
}

function generateOfflineAnalysis(md,ind,positions,hasLeaps){
  const ml={surge:"急漲",sideways:"橫盤",bearish:"偏空穩定"};
  const mode=ind.mode;

  if(!hasLeaps){
    // 空倉模式
    if(mode==="surge"){
      return `目前空倉。市場處於急漲模式（${ind.fired}/5 指標觸發），QQQ 週漲 ${md.weekly.toFixed(1)}%，距近期低點 +${md.rally.toFixed(1)}%。\n\n現在不建議追高買入 LEAPS。急漲行情通常伴隨回調風險，在高位建倉成本太高。\n\n建議等待 QQQ 回調 5-8% 後再考慮建倉。回調後買入 LEAPS 能獲得更低的持有成本和更大的上漲空間。`;
    }else if(mode==="sideways"){
      const strike=Math.round(md.price*0.85/5)*5;
      return `目前空倉。市場處於橫盤模式，現在是考慮建倉的時機。\n\n建議買入 Long LEAPS：行權價約 $${strike}（深度 ITM），到期日選 12-18 個月後，Delta 目標 0.70-0.80。\n\n建倉後若市場繼續橫盤，可考慮賣出 Short Call（Delta 0.20-0.30）開始收租。若市場上漲，讓 LEAPS 自由跑。`;
    }else{
      const strike=Math.round(md.price*0.82/5)*5;
      return `目前空倉。市場偏空穩定，這是較好的建倉時機，成本相對低。\n\n可以考慮買入 Long LEAPS：行權價約 $${strike}，到期日 12-18 個月後，Delta 0.70-0.80。\n\n建倉後先觀察，等市場出現反彈確認信號後，再考慮賣出保守的 Short Call（Delta 0.15-0.20）。`;
    }
  }else{
    if(mode==="surge"){
      return `市場急漲模式（${ind.fired}/5 觸發）。QQQ 週漲 ${md.weekly.toFixed(1)}%，EMA 距離 ${md.emaDist.toFixed(1)}%。\n\n禁止賣出任何 Short Call。你的 LEAPS 正在為你賺錢，Short Call 只會對沖掉這些獲利。\n\n若已有 Short Call 且緩衝不足 3%，立即評估 Roll Up and Out。今天最好的操作是什麼都不做，讓 LEAPS 跑。`;
    }else if(mode==="sideways"){
      return `市場橫盤模式，這是 PMCC 的主場。指標顯示混合信號，趨勢不明確。\n\n若目前無 Short Call，可以考慮開倉：到期 30-45 天，Delta 0.20-0.30，行權價緩衝至少 3%，權利金目標 $500+。\n\n若已有 Short Call，持倉觀察，等租金消耗 50-75% 再換倉。`;
    }else{
      return `市場穩定偏空，IV 環境通常較高，是賣出 Short Call 的好時機。\n\nLEAPS 可能有輕微浮虧，這是正常的。Short Call 收的租金在對沖損失。\n\n建議保守開倉：Delta 0.15-0.20，行權價緩衝 5% 以上，等市場反彈確認後再積極收租。`;
    }
  }
}

const C={
  bg:"#07090c",surf:"#0d1320",surf2:"#0a0c10",surf3:"#111825",
  border:"#1a2535",border2:"#222f40",
  gold:"#f0a500",goldDim:"rgba(240,165,0,0.1)",goldBorder:"rgba(240,165,0,0.25)",

  text:"#e8e8e8",dim:"#6080a0",muted:"#2a3848",

const MODE={
  surge:   {label:"急漲模式",color:C.red,  bg:C.redDim,  border:C.redBorder,  title:"禁止收租",     sub:"讓 LEAPS 自由運作，不賣任何 Short Call"},
  sideways:{label:"橫盤模式",color:C.gold, bg:C.goldDim, border:C.goldBorder, title:"可以收租",     sub:"符合條件可賣出 Short Call，Delta 0.20–0.30"},
  bearish: {label:"偏空模式",color:C.green,bg:C.greenDim,border:C.greenBorder,title:"保守收租",     sub:"Delta 0.15–0.20，行權價緩衝 5%+"},
  unknown: {label:"等待分析",color:C.muted,bg:"transparent",border:C.border,  title:"——",           sub:"點擊上方按鈕開始今日分析"},
};

const ENTRY_MODE={
  surge:   {label:"不建議進場",color:C.red,  sub:"急漲中追高成本太高，等回調 5-8%"},
  sideways:{label:"可以建倉",  color:C.gold, sub:"橫盤是建立 LEAPS 倉位的好時機"},
  bearish: {label:"適合建倉",  color:C.green,sub:"偏空時成本較低，是建倉好機會"},
  unknown: {label:"等待分析",  color:C.muted,sub:"點擊分析按鈕"},
};

function SectionLabel({children}){
  return(
    <div style={{display:"flex",alignItems:"center",gap:10,margin:"16px 0 10px"}}>
      <div style={{fontSize:10,color:C.muted,letterSpacing:2,textTransform:"uppercase",whiteSpace:"nowrap",fontFamily:"'JetBrains Mono',monospace"}}>{children}</div>
      <div style={{flex:1,height:1,background:C.border}} />
    </div>
  );
}

function App(){
  const[tab,setTab]=useState("today");
  const[positions,setPositions]=useState(load);
  const[md,setMd]=useState(null);
  const[ind,setInd]=useState(null);
  const[mode,setMode]=useState("unknown");
  const[analysis,setAnalysis]=useState("");
  const[loading,setLoading]=useState(false);
  const[ctx,setCtx]=useState("");
  const[toast,setToast]=useState("");
  const[form,setForm]=useState({type:"long",strike:"",expiry:"",cost:"",current:"",sell:"",delta:"",qty:"1"});

  useEffect(()=>{save(positions)},[positions]);
  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(""),2500)};

  const hasLeaps=positions.some(p=>p.type==="long");
  const hasShort=positions.some(p=>p.type==="short");

  const runAnalysis=useCallback(async()=>{
    setLoading(true);
    setAnalysis("正在取得市場數據...");
    try{
      const data=await fetchMarket();
      setMd(data);
      const i=evalInd(data);
      setInd(i);
      setMode(i.mode);
      setAnalysis("AI 交易員正在分析...");
      const t=await askClaude(data,i,positions,ctx,!hasLeaps);
      setAnalysis(t);
    }catch(e){
      console.error(e);
      // 嘗試純離線分析
      if(md&&ind){
        const t=generateOfflineAnalysis(md,ind,positions,hasLeaps);
        setAnalysis(t+"（離線模式，數據來自上次抓取）");
      }else{
        setAnalysis("數據獲取失敗，請確認網路連接後重試。");
      }
    }
    setLoading(false);
  },[positions,ctx,hasLeaps,md,ind]);

  const addPos=()=>{
    const f=form;
    const req=f.type==="long"?["strike","expiry","cost","current","delta"]:["strike","expiry","sell","current","delta"];
    if(req.some(k=>!f[k])){showToast("請填寫所有必填欄位");return;}
    const p={id:Date.now(),type:f.type,strike:+f.strike,expiry:f.expiry,current:+f.current,delta:+f.delta,qty:+f.qty||1,
      cost:f.type==="long"?+f.cost:undefined,sell:f.type==="short"?+f.sell:undefined};
    setPositions(prev=>[...prev,p]);
    setForm({type:"long",strike:"",expiry:"",cost:"",current:"",sell:"",delta:"",qty:"1"});
    showToast("倉位已新增");
    setTab("positions");
  };

  const netPnl=positions.reduce((s,p)=>{
    if(p.type==="long")return s+(p.current-p.cost)*100*p.qty;
    if(p.type==="short")return s+(p.sell-p.current)*100*p.qty;
    return s;
  },0);

  const now=new Date();
  const dateStr=now.toLocaleDateString("zh-TW",{month:"numeric",day:"numeric",weekday:"short"});

  // ── TODAY PAGE ──────────────────────────────────────────────────────────────
  const todayPage=(
    <div style={{padding:"14px 14px 20px",overflowY:"auto",height:"100%"}}>

      {/* Portfolio Status Banner */}
      <div style={{
        background:hasLeaps?C.greenDim:"rgba(240,165,0,0.06)",
        border:`1px solid ${hasLeaps?C.greenBorder:C.goldBorder}`,
        borderRadius:8,padding:"10px 14px",marginBottom:12,
        display:"flex",justifyContent:"space-between",alignItems:"center"
      }}>
        <div style={{fontSize:12,color:hasLeaps?C.green:C.gold,fontWeight:700,letterSpacing:0.5}}>
          {hasLeaps?"✓ 已持有 Long LEAPS":"○ 空倉狀態"}
        </div>
        <div style={{fontSize:11,color:C.muted,fontFamily:"'JetBrains Mono',monospace"}}>
          {positions.length===0?"無持倉":`${positions.filter(p=>p.type==="long").length}Long · ${positions.filter(p=>p.type==="short").length}Short`}
        </div>
      </div>

      {/* Context */}
      <div style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:8,padding:"12px 14px",marginBottom:12}}>
        <div style={{fontSize:10,color:C.muted,letterSpacing:1,marginBottom:8,fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase"}}>今天有需要讓我知道的情況？</div>
        <textarea value={ctx} onChange={e=>setCtx(e.target.value)}
          placeholder="例：下個月需要資金、對地緣事件有看法、考慮加倉..."
          style={{width:"100%",background:C.surf2,border:`1px solid ${C.border}`,borderRadius:6,
            padding:"9px 11px",color:C.text,fontSize:13,resize:"none",minHeight:60,outline:"none"}} />
      </div>

      {/* Analyze Btn */}
      <button onClick={runAnalysis} disabled={loading}
        style={{width:"100%",padding:14,background:loading?C.goldDim:"rgba(240,165,0,0.12)",
          border:`1px solid ${C.goldBorder}`,borderRadius:8,color:C.gold,fontSize:14,fontWeight:700,
          letterSpacing:2,cursor:loading?"not-allowed":"pointer",marginBottom:12,
          display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
        {loading?"⟳  分析中...":"⟳  開始今日分析"}
      </button>

      {/* Mode Card — 空倉時顯示進場評估，有倉位時顯示操作模式 */}
      {(()=>{
        if(!hasLeaps&&mode!=="unknown"){
          const em=ENTRY_MODE[mode];
          return(
            <div style={{background:C.goldDim,border:`1px solid ${C.goldBorder}`,borderRadius:10,padding:"16px",marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <div style={{fontSize:10,fontWeight:700,color:C.gold,letterSpacing:2,fontFamily:"'JetBrains Mono',monospace"}}>空倉 · 進場評估</div>
                {ind&&<div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:C.muted}}>{ind.fired}/5 觸發</div>}
              </div>
              <div style={{fontSize:28,fontWeight:900,color:em.color,letterSpacing:-0.5,lineHeight:1.1}}>{em.label}</div>
              <div style={{fontSize:12,color:C.dim,marginTop:6}}>{em.sub}</div>
            </div>
          );
        }
        const m=MODE[mode];
        return(
          <div style={{background:m.bg,border:`1px solid ${m.border}`,borderRadius:10,padding:"16px",marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <div style={{fontSize:10,fontWeight:700,color:m.color,letterSpacing:2,background:`${m.color}18`,
                padding:"2px 8px",borderRadius:4,fontFamily:"'JetBrains Mono',monospace"}}>{m.label}</div>
              {ind&&<div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:C.muted}}>{ind.fired}/5 觸發</div>}
            </div>
            <div style={{fontSize:28,fontWeight:900,color:m.color,letterSpacing:-0.5,lineHeight:1.1}}>{m.title}</div>
            <div style={{fontSize:12,color:C.dim,marginTop:6}}>{m.sub}</div>
          </div>
        );
      })()}

      {/* Market Row */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
        {[
          {label:"QQQ",val:md?`$${md.price.toFixed(2)}`:"--",up:null},
          {label:"今日",val:md?`${md.daily>=0?"+":""}${md.daily.toFixed(2)}%`:"--",up:md?md.daily>=0:null},
          {label:"本週",val:md?`${md.weekly>=0?"+":""}${md.weekly.toFixed(1)}%`:"--",up:md?md.weekly>=0:null},
        ].map(it=>(
          <div key={it.label} style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:8,padding:"11px 8px",textAlign:"center"}}>
            <div style={{fontSize:10,color:C.muted,marginBottom:5,fontFamily:"'JetBrains Mono',monospace"}}>{it.label}</div>
            <div style={{fontSize:16,fontWeight:700,color:it.up===null?C.text:it.up?C.green:C.red,fontVariantNumeric:"tabular-nums"}}>{it.val}</div>
          </div>
        ))}
      </div>

      {/* Indicators */}
      <SectionLabel>技術指標</SectionLabel>
      {(ind?ind.items:[
        {id:"wk",name:"週漲幅",val:"--",fired:false},
        {id:"em",name:"EMA 距離",val:"--",fired:false},
        {id:"rl",name:"距近期低點",val:"--",fired:false},
        {id:"mc",name:"MACD",val:"--",fired:false},
        {id:"vl",name:"成交量比",val:"--",fired:false},
      ]).map(it=>(
        <div key={it.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",
          background:C.surf,border:`1px solid ${C.border}`,borderRadius:7,padding:"11px 13px",marginBottom:7}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:7,height:7,borderRadius:"50%",
              background:it.val==="--"?C.muted:it.fired?C.red:C.green,
              boxShadow:it.val==="--"?"none":it.fired?`0 0 7px ${C.red}`:`0 0 7px ${C.green}`,
              flexShrink:0}} />
            <div style={{fontSize:13,color:C.dim}}>{it.name}</div>
          </div>
          <div style={{fontSize:13,fontWeight:600,
            color:it.val==="--"?C.muted:it.fired?C.red:C.text,
            fontVariantNumeric:"tabular-nums",fontFamily:"'JetBrains Mono',monospace"}}>{it.val}</div>
        </div>
      ))}

      {/* AI Analysis */}
      <SectionLabel>AI 交易員判斷</SectionLabel>
      <div style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:10,padding:"16px 14px",
        borderTop:`2px solid ${C.gold}`}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
          <div style={{width:7,height:7,borderRadius:"50%",background:C.gold,boxShadow:`0 0 8px ${C.gold}`}} />
          <div style={{fontSize:10,color:C.gold,letterSpacing:2,textTransform:"uppercase",
            fontFamily:"'JetBrains Mono',monospace",fontWeight:700}}>
            {!hasLeaps?"進場評估報告":"今日操作報告"}
          </div>
        </div>
        <div style={{fontSize:14,color:C.dim,lineHeight:1.95,whiteSpace:"pre-wrap"}}>
          {analysis||`點擊「開始今日分析」\nAI 交易員將根據市場數據${!hasLeaps?"，評估是否應該買入 Long LEAPS。":"和你的持倉，給出今天的操作建議。"}`}
        </div>
      </div>

      {/* LEAPS Entry Suggestion (空倉時顯示) */}
      {!hasLeaps&&mode!=="unknown"&&(
        <div style={{background:C.surf3,border:`1px solid ${C.border}`,borderRadius:10,padding:"16px 14px",marginTop:12}}>
          <div style={{fontSize:10,color:C.gold,letterSpacing:2,fontFamily:"'JetBrains Mono',monospace",marginBottom:12,fontWeight:700}}>LEAPS 建倉參考</div>
          {md&&(()=>{
            const itm=Math.round(md.price*0.83/5)*5;
            const otm=Math.round(md.price*0.87/5)*5;
            return(
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {[
                  {label:"建議行權價（保守）",val:`$${itm}`,sub:"Delta ≈ 0.75"},
                  {label:"建議行權價（積極）",val:`$${otm}`,sub:"Delta ≈ 0.72"},
                  {label:"建議到期日",val:"12-18 個月",sub:"時間價值充足"},
                  {label:"目標 Delta",val:"0.70-0.80",sub:"深度 ITM"},
                ].map(d=>(
                  <div key={d.label} style={{background:C.surf2,borderRadius:6,padding:"10px 12px"}}>
                    <div style={{fontSize:9,color:C.muted,marginBottom:4}}>{d.label}</div>
                    <div style={{fontSize:14,fontWeight:700,color:C.text,fontVariantNumeric:"tabular-nums"}}>{d.val}</div>
                    <div style={{fontSize:10,color:C.muted,marginTop:2}}>{d.sub}</div>
                  </div>
                ))}
              </div>
            );
          })()}
        </div>
      )}
    </div>
  );

  // ── POSITIONS PAGE ──────────────────────────────────────────────────────────
  const posPage=(
    <div style={{padding:"14px 14px 20px",overflowY:"auto",height:"100%"}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
        {[
          {label:"組合淨值",val:`${netPnl>=0?"+":""}$${Math.abs(netPnl).toFixed(0)}`,profit:netPnl>=0,nonzero:netPnl!==0},
          {label:"持倉數量",val:`${positions.length} 張`,profit:null},
        ].map(it=>(
          <div key={it.label} style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:8,padding:"14px 12px"}}>
            <div style={{fontSize:10,color:C.muted,marginBottom:6,fontFamily:"'JetBrains Mono',monospace"}}>{it.label}</div>
            <div style={{fontSize:24,fontWeight:900,fontVariantNumeric:"tabular-nums",
              color:it.profit===null?C.gold:it.nonzero?(it.profit?C.green:C.red):C.gold}}>{it.val}</div>
          </div>
        ))}
      </div>

      <SectionLabel>當前持倉</SectionLabel>

      {positions.length===0?(
        <div style={{textAlign:"center",padding:"40px 20px",color:C.muted,fontSize:13,lineHeight:2}}>
          尚未新增任何持倉<br/>前往「新增」開始
        </div>
      ):positions.map(p=>{
        const pnl=p.type==="long"?(p.current-p.cost)*100*p.qty:(p.sell-p.current)*100*p.qty;
        const pct=p.type==="long"?((p.current-p.cost)/p.cost*100):((p.sell-p.current)/p.sell*100);
        let aType="ok",aMsg="";
        if(p.type==="long"){
          aMsg=`持有中 · Delta ${p.delta} · 每漲$10賺$${(p.delta*1000*p.qty).toFixed(0)}`;
        }else{
          const buf=md?((p.strike-md.price)/md.price*100):null;
          if(buf!==null&&buf<2){aType="danger";aMsg=`🔴 緩衝僅 ${buf.toFixed(1)}%，建議立即 Roll`;}
          else if(p.delta>0.40){aType="danger";aMsg=`⚠️ Delta ${p.delta} 超過警戒線 0.40`;}
          else if(pnl<0&&Math.abs(pct)>150){aType="warn";aMsg=`⚠️ 虧損超過 150%，接近停損線`;}
          else{aMsg=`50%獲利點 $${(p.sell*0.5).toFixed(2)} · 停損 $${(p.sell*2).toFixed(2)}`;}
        }
        const aC=aType==="ok"?C.green:aType==="warn"?C.gold:C.red;
        return(
          <div key={p.id} style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:10,padding:"16px 14px",marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
              <div>
                <div style={{fontSize:10,fontWeight:700,letterSpacing:1.5,padding:"3px 8px",borderRadius:4,display:"inline-block",
                  fontFamily:"'JetBrains Mono',monospace",
                  background:p.type==="long"?C.greenDim:C.redDim,
                  color:p.type==="long"?C.green:C.red,
                  border:`1px solid ${p.type==="long"?C.greenBorder:C.redBorder}`}}>
                  {p.type==="long"?"LONG LEAPS":"SHORT CALL"}
                </div>
                <div style={{fontSize:15,fontWeight:700,color:C.text,marginTop:7,fontFamily:"'JetBrains Mono',monospace"}}>QQQ {p.expiry} {p.strike}C × {p.qty}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:24,fontWeight:900,fontVariantNumeric:"tabular-nums",color:pnl>=0?C.green:C.red}}>{pnl>=0?"+":""}${Math.abs(pnl).toFixed(0)}</div>
                <div style={{fontSize:11,color:C.muted,fontFamily:"'JetBrains Mono',monospace"}}>{pnl>=0?"+":""}{pct.toFixed(1)}%</div>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginBottom:10}}>
              {[
                {l:p.type==="long"?"成本":"賣出價",v:`$${p.type==="long"?p.cost:p.sell}`},
                {l:"現值",v:`$${p.current}`},
                {l:"Delta",v:p.delta},
              ].map(d=>(
                <div key={d.l} style={{background:C.surf2,borderRadius:6,padding:"8px 10px"}}>
                  <div style={{fontSize:9,color:C.muted,marginBottom:4}}>{d.l}</div>
                  <div style={{fontSize:13,fontWeight:600,color:C.text,fontVariantNumeric:"tabular-nums",fontFamily:"'JetBrains Mono',monospace"}}>{d.v}</div>
                </div>
              ))}
            </div>
            <div style={{padding:"9px 12px",borderRadius:6,fontSize:12,borderLeft:`3px solid ${aC}`,
              background:`${aC}10`,color:aC,fontFamily:"'JetBrains Mono',monospace"}}>{aMsg}</div>
            <button onClick={()=>{setPositions(prev=>prev.filter(x=>x.id!==p.id));showToast("已刪除");}}
              style={{width:"100%",marginTop:10,padding:"8px",background:"transparent",
                border:`1px solid ${C.border}`,borderRadius:6,color:C.muted,fontSize:11,cursor:"pointer",letterSpacing:1}}>刪除此倉位</button>
          </div>
        );
      })}
    </div>
  );

  // ── ADD PAGE ────────────────────────────────────────────────────────────────
  const addPage=(
    <div style={{padding:"14px 14px 20px",overflowY:"auto",height:"100%"}}>
      <div style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:10,padding:"18px 14px"}}>
        <div style={{fontSize:12,color:C.gold,letterSpacing:2,textTransform:"uppercase",
          marginBottom:14,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>新增倉位</div>

        <div style={{display:"flex",gap:8,marginBottom:16}}>
          {["long","short"].map(t=>(
            <button key={t} onClick={()=>setForm(f=>({...f,type:t}))}
              style={{flex:1,padding:"11px",borderRadius:6,cursor:"pointer",fontSize:13,fontWeight:700,
                border:form.type===t?`1px solid ${C.gold}`:`1px solid ${C.border}`,
                background:form.type===t?C.goldDim:"transparent",
                color:form.type===t?C.gold:C.muted}}>
              {t==="long"?"Long LEAPS":"Short Call"}
            </button>
          ))}
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
          {[
            {key:"strike",  label:"行權價",                            ph:form.type==="long"?"515":"750"},
            {key:"expiry",  label:"到期日 YYMMDD",                     ph:form.type==="long"?"270115":"260630"},
            {key:form.type==="long"?"cost":"sell",
                            label:form.type==="long"?"買入成本":"賣出價格",ph:form.type==="long"?"124.72":"8.50"},
            {key:"current", label:"現值",                              ph:form.type==="long"?"226.05":"5.00"},
            {key:"delta",   label:"Delta",                             ph:form.type==="long"?"0.75":"0.25"},
            {key:"qty",     label:"張數",                              ph:"1"},
          ].map(f=>(
            <div key={f.key}>
              <div style={{fontSize:10,color:C.muted,marginBottom:6,fontFamily:"'JetBrains Mono',monospace"}}>{f.label}</div>
              <input type="number" step="any" placeholder={f.ph}
                value={form[f.key]||""}
                onChange={e=>setForm(prev=>({...prev,[f.key]:e.target.value}))}
                style={{width:"100%",background:C.surf2,border:`1px solid ${C.border2}`,borderRadius:6,
                  padding:"12px",color:C.text,fontSize:15,fontWeight:700,outline:"none",fontVariantNumeric:"tabular-nums"}} />
            </div>
          ))}
        </div>

        <button onClick={addPos}
          style={{width:"100%",padding:15,background:`linear-gradient(135deg,${C.gold},#c8841a)`,
            border:"none",borderRadius:8,color:"#000",fontSize:14,fontWeight:900,letterSpacing:2,cursor:"pointer"}}>
          新增 {form.type==="long"?"Long LEAPS":"Short Call"}
        </button>
      </div>

      {/* Tips */}
      <div style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:8,padding:"14px",marginTop:12}}>
        <div style={{fontSize:10,color:C.muted,letterSpacing:1,marginBottom:10,fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase"}}>填寫提示</div>
        {[
          "到期日格式：270115 代表 2027年01月15日",
          "現值每天更新，讓 P&L 保持準確",
          "Delta 可在期權詳情頁查看",
        ].map((t,i)=>(
          <div key={i} style={{fontSize:12,color:C.dim,paddingLeft:12,position:"relative",marginBottom:6}}>
            <span style={{position:"absolute",left:0,color:C.muted}}>·</span>{t}
          </div>
        ))}
      </div>
    </div>
  );

  // ── RENDER ──────────────────────────────────────────────────────────────────
  return(
    <div style={{background:C.bg,maxWidth:430,margin:"0 auto",display:"flex",flexDirection:"column",
      height:"100dvh",overflow:"hidden"}}>

      {/* Header */}
      <div style={{background:"rgba(7,9,12,0.97)",backdropFilter:"blur(12px)",
        padding:"16px 16px 12px",borderBottom:`1px solid ${C.border}`,
        display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0,
        paddingTop:"max(16px, env(safe-area-inset-top, 16px))"}}>
        <div>
          <div style={{fontSize:18,fontWeight:900,color:C.text,letterSpacing:1}}>PMCC ADVISOR</div>
          <div style={{fontSize:10,color:C.muted,marginTop:2,letterSpacing:1,fontFamily:"'JetBrains Mono',monospace"}}>AI TRADING INTELLIGENCE</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:11,color:C.muted,fontFamily:"'JetBrains Mono',monospace"}}>{dateStr}</div>
          <div style={{fontSize:10,marginTop:2,fontFamily:"'JetBrains Mono',monospace",
            color:hasLeaps?C.green:C.gold}}>
            {hasLeaps?"有倉位":"空倉"}
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",background:"#0d1018",borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
        {[["today","今日分析"],["positions","持倉"],["add","新增"]].map(([id,label])=>(
          <div key={id} onClick={()=>setTab(id)}
            style={{flex:1,padding:"13px 8px",textAlign:"center",fontSize:13,
              fontWeight:tab===id?700:400,
              color:tab===id?C.gold:C.muted,
              borderBottom:tab===id?`2px solid ${C.gold}`:"2px solid transparent",
              cursor:"pointer",transition:"all 0.15s",letterSpacing:0.5}}>
            {label}
          </div>
        ))}
      </div>

      {/* Content */}
      <div style={{flex:1,overflow:"hidden"}}>
        {tab==="today"&&todayPage}
        {tab==="positions"&&posPage}
        {tab==="add"&&addPage}
      </div>

      {/* Bottom Nav */}
      <div style={{background:"rgba(7,9,12,0.97)",backdropFilter:"blur(12px)",
        borderTop:`1px solid ${C.border}`,display:"flex",flexShrink:0,
        paddingBottom:"env(safe-area-inset-bottom, 0)"}}>
        {[{id:"today",icon:"🧠",label:"今日"},{id:"positions",icon:"📊",label:"持倉"},{id:"add",icon:"＋",label:"新增"}].map(n=>(
          <button key={n.id} onClick={()=>setTab(n.id)}
            style={{flex:1,padding:"12px 8px",display:"flex",flexDirection:"column",alignItems:"center",
              gap:4,background:"none",border:"none",cursor:"pointer"}}>
            <div style={{fontSize:20,opacity:tab===n.id?1:0.3}}>{n.icon}</div>
            <div style={{fontSize:9,letterSpacing:1,color:tab===n.id?C.gold:C.muted,
              textTransform:"uppercase",fontWeight:tab===n.id?700:400,
              fontFamily:"'JetBrains Mono',monospace"}}>{n.label}</div>
          </button>
        ))}
      </div>

      {/* Toast */}
      {toast&&(
        <div style={{position:"fixed",bottom:90,left:"50%",transform:"translateX(-50%)",
          background:C.surf,border:`1px solid ${C.border2}`,borderRadius:6,
          padding:"10px 18px",fontSize:12,color:C.text,zIndex:200,whiteSpace:"nowrap",
          fontFamily:"'JetBrains Mono',monospace"}}>
          {toast}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
