function calcEMA(data,n){
  if(data.length<n)return[data.at(-1)||0];
  const k=2/(n+1);
  let e=data.slice(0,n).reduce((a,b)=>a+b,0)/n;
  const r=[e];
  for(let i=n;i<data.length;i++){e=data[i]*k+e*(1-k);r.push(e)}
  return r;
}

// ── 週線數據抓取 ──────────────────────────────────────────────────────────────
async function fetchMarket(){
  // 週線：interval=1wk，range=104wk（2年，約104根週K）
  const target="https://query1.finance.yahoo.com/v8/finance/chart/QQQ?interval=1wk&range=104wk";
  const proxies=[
    u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,
    u=>`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
    u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  ];
  let raw=null;
  for(const mk of proxies){
    try{
      const r=await fetch(mk(target),{signal:AbortSignal.timeout(9000)});
      if(!r.ok)continue;
      const txt=await r.text();
      let p;try{const j=JSON.parse(txt);p=j.contents?JSON.parse(j.contents):j;}catch{p=JSON.parse(txt);}
      if(p?.chart?.result?.[0]){raw=p;break;}
    }catch{continue;}
  }
  if(!raw)throw new Error("數據源不可用");

  const chart=raw.chart.result[0];
  const q=chart.indicators.quote[0];
  const allC=q.close,allV=q.volume,allH=q.high,allL=q.low,allO=q.open;
  const valid=allC.map((c,i)=>({
    c,v:allV[i]||0,h:allH[i]||c,l:allL[i]||c,o:allO[i]||c
  })).filter(d=>d.c!=null&&!isNaN(d.c));
  if(valid.length<30)throw new Error("週線數據不足");

  const cl=valid.map(d=>d.c);
  const vl=valid.map(d=>d.v);
  const hl=valid.map(d=>d.h);
  const ll=valid.map(d=>d.l);

  const cur=cl.at(-1),prev=cl.at(-2);
  const prev2=cl.at(-3);

  // 週線漲幅
  const weeklyChg=(cur-prev)/prev*100;
  const weeklyChgPrev=(prev-prev2)/prev2*100;

  // 月漲幅（4週前）
  const mo4=cl.at(-5)||cl[0];
  const monthly=(cur-mo4)/mo4*100;

  // 52週（約52根週K）
  const yr=cl.slice(-52);
  const hi52=Math.max(...yr),lo52=Math.min(...yr);
  const fromHi52=(cur-hi52)/hi52*100;
  const fromLo52=(cur-lo52)/lo52*100;
  const histPct=Math.round((cur-lo52)/(hi52-lo52)*100);

  // 週線EMA（用週收盤計算）
  const e5=calcEMA(cl,5),e10=calcEMA(cl,10),e20=calcEMA(cl,20),e40=calcEMA(cl,40);
  const distE20=(cur-e20.at(-1))/e20.at(-1)*100;

  // 週線MACD（12,26,9）
  const e12=calcEMA(cl,12),e26=calcEMA(cl,26);
  const macdLine=cl.map((_,i)=>{
    const idx12=Math.max(0,e12.length-cl.length+i);
    const idx26=Math.max(0,e26.length-cl.length+i);
    return(e12[idx12]||0)-(e26[idx26]||0);
  });
  const macdNow=e12.at(-1)-e26.at(-1);
  const macdPrev=e12.at(-2)-e26.at(-2);
  const signal9=calcEMA(macdLine,9);
  const histNow=macdNow-signal9.at(-1);
  const histPrev=macdPrev-signal9.at(-2);

  // 週線成交量RV（近20週均量）
  const avgVol20=vl.slice(-20).reduce((a,b)=>a+b,0)/20;
  const volRatio=avgVol20>0?vl.at(-1)/avgVol20:1;
  const volRatioPrev=avgVol20>0?vl.at(-2)/avgVol20:1;

  // 週內V型：本週low到收盤漲幅
  const weekIntraSwing=(cur-ll.at(-1))/ll.at(-1)*100;

  // 連漲判斷（週線）
  const wk2Up=cur>prev&&prev>prev2;
  const wk3Up=cur>prev&&prev>prev2&&(cl.at(-4)!=null?prev2>cl.at(-4):true);
  const wk2Down=cur<prev&&prev<prev2;

  return{
    price:cur,prev,weekly:weeklyChg,weeklyPrev:weeklyChgPrev,monthly,
    hi52,lo52,fromHi52,fromLo52,histPct,
    ema5:e5.at(-1),ema10:e10.at(-1),ema20:e20.at(-1),ema40:e40.at(-1),
    distE20,
    macd:macdNow,macdPrev,macdExp:macdNow>macdPrev,
    histNow,histPrev,
    histShrink:histPrev!==0?Math.abs((histNow-histPrev)/histPrev)*100:0,
    volRatio,volRatioPrev,
    weekIntraSwing,
    wk2Up,wk3Up,wk2Down,
    aboveE20:cur>e20.at(-1),aboveE40:cur>e40.at(-1),
    monthTrend:cur>e20.at(-1)?"up":cur<e20.at(-1)*0.97?"down":"flat",
  };
}

// ── 週線分析邏輯（v2.1框架）────────────────────────────────────────────────
function analyzeTrend(md,week2State){
  // 第一層：歷史位置
  let posLabel,posColor;
  const p=md.histPct;
  if(p>=80){posLabel="歷史高位區";posColor="red";}
  else if(p>=55){posLabel="中高位區";posColor="amber";}
  else if(p>=30){posLabel="中間位置";posColor="blue";}
  else{posLabel="歷史低位區";posColor="green";}

  // 第二層：趨勢結構（週線）
  const isBottomSignalA=md.weekly>3&&md.volRatio>1.2;
  const isBottomSignalC=md.weekIntraSwing>5;
  const isBottomSignalB=md.weekly>2&&md.weeklyPrev>2;
  const isBottomKDJOversold=md.histPct<35&&md.volRatio>1.0;// KDJ超賣用百分位+放量替代

  const hasBottomSignal=isBottomSignalA||isBottomSignalC||isBottomSignalB;

  const isUptrend=md.aboveE20&&md.macd>0&&md.wk2Up;
  const isDowntrend=!md.aboveE20&&md.macd<0&&md.wk2Down;
  const isTopReversal=md.histPct>80&&md.wk2Down&&md.monthly<-5;

  // 假信號過濾：量價背離
  const isFakeSignal=md.volRatio>2.5&&Math.abs(md.weekly)<1;

  // 頂部警示（週線）
  const isTopWarningVol=md.histPct>80&&md.volRatio<0.7;
  // 頂部確認：MACD Hist急縮>50%且為負 + 放量下跌
  const histShrinkBig=md.histNow<0||(md.histPrev>0&&md.histShrink>50);
  const isTopConfirm=md.weekly<-1.5&&md.volRatio>1.0&&histShrinkBig;

  let strLabel,strColor,strDetail;
  if(hasBottomSignal&&p<55){
    strLabel="底部反轉信號";strColor="green";
    strDetail=`週漲${md.weekly.toFixed(1)}%，RV=${md.volRatio.toFixed(2)}x，底部放量反彈特徵`;
  }else if(isTopReversal){
    strLabel="頂部反轉警示";strColor="red";
    strDetail=`週線連跌，距高點${md.fromHi52.toFixed(1)}%，月跌${Math.abs(md.monthly).toFixed(1)}%`;
  }else if(isUptrend){
    strLabel="上升趨勢持續";strColor="amber";
    strDetail="站穩週線EMA20，MACD偏多，週線連漲";
  }else if(isDowntrend){
    strLabel="下跌趨勢中";strColor="red";
    strDetail="跌破週線EMA20，MACD偏空，週線連跌";
  }else{
    strLabel="趨勢整理中";strColor="blue";
    strDetail="EMA20附近整理，等待方向確認";
  }

  // 動能評分（週線）
  const momScore=(md.macdExp?1:0)+(md.volRatio>1.0?1:0)+(md.weekly>2?1:0)+(md.distE20>2?1:0);
  const momLabel=momScore>=3?"強勁":momScore>=2?"溫和":"疲弱";
  const momColor=momScore>=3?"green":momScore>=2?"amber":"red";

  // ── v2.1 進場決策邏輯 ─────────────────────────────────────────────────────
  // week2State：記錄上週是否為第一週信號（半倉進場後等待確認）
  const isWeek1Signal=hasBottomSignal&&p<60&&!isFakeSignal;
  const isWeek2Confirm=week2State&&md.weekly>2&&md.volRatio>0.8;
  const isWeek2Weak=week2State&&md.weekly>2&&md.volRatio<=0.8;
  const isWeek2StopLoss=week2State&&md.weekly<-2;// 跌破第一週低點（簡化）

  // 底部5個確認條件
  const cond1=p<35;
  const cond2=md.wk3Up;
  const cond3=md.aboveE20;
  const cond4=md.monthly>5;
  const cond5=md.fromLo52>8;
  const condCount=[cond1,cond2,cond3,cond4,cond5].filter(Boolean).length;

  let decision,decColor,decDetail;
  let positionSize=""; // 半倉 or 全倉

  if(isFakeSignal){
    decision="假信號警告";decColor="red";
    decDetail="量價背離：大量推不動價格，不進場";
    positionSize="";
  }else if(isTopConfirm||isTopReversal){
    decision="評估離場";decColor="red";
    decDetail="頂部確認信號，次週開盤執行離場";
    positionSize="";
  }else if(isWeek2StopLoss){
    decision="止損出場";decColor="red";
    decDetail="第二週跌破第一週低點，假信號保護觸發";
    positionSize="";
  }else if(isWeek2Confirm){
    decision="加倉至全倉";decColor="green";
    decDetail="第二週確認：週漲>2%且量能維持，加至全倉";
    positionSize="全倉";
  }else if(isWeek2Weak){
    decision="持有半倉觀察";decColor="amber";
    decDetail="第二週縮量上漲，量能不足，維持半倉繼續觀察";
    positionSize="半倉";
  }else if(isWeek1Signal&&condCount>=3){
    decision="半倉建倉";decColor="green";
    decDetail=`底部信號出現（${condCount}/5確認條件），半倉試探進場，等待下週確認`;
    positionSize="半倉";
  }else if(isUptrend&&p<75&&md.distE20<10){
    decision="持倉讓跑";decColor="gold";
    decDetail="週線上升趨勢中段，讓LEAPS完整參與，禁止Short Call";
    positionSize="";
  }else if(isUptrend&&(p>=75||md.distE20>=10)){
    decision="謹慎持有";decColor="amber";
    decDetail="接近高位或過度拉伸，監控頂部警示條件";
    positionSize="";
  }else if(isTopWarningVol){
    decision="頂部警戒";decColor="amber";
    decDetail="高位量縮，頂部警示之一，進入警戒狀態";
    positionSize="";
  }else if(!md.aboveE20&&Math.abs(md.weekly)<1.5){
    decision="收租觀察";decColor="blue";
    decDetail="週線橫盤整理，無明確方向，可考慮保守Short Call";
    positionSize="";
  }else{
    decision="觀察等待";decColor="muted";
    decDetail="週線信號不明確，持有SGOV，等待更清晰的底部信號";
    positionSize="";
  }

  // 操作步驟（週線版）
  let actionSteps=[];
  const strike1=Math.round(md.price*0.80/5)*5;
  const strike2=Math.round(md.price*0.85/5)*5;

  if(decision==="半倉建倉"){
    actionSteps=[
      {icon:"!",text:`本週收盤出現底部信號（${condCount}/5確認條件）`,check:null},
      {icon:"1",text:`下週開盤執行：買入 Long LEAPS 半倉（$8,000），行權價 $${strike1}–$${strike2}，到期 12–18 個月`,check:null},
      {icon:"2",text:`止損線：本週最低點 $${(md.price*(1+md.fromLo52/100*(1-md.fromLo52/100/10))).toFixed(0)}，跌破立即出場`,check:null},
      {icon:"3",text:"下週若再漲>2%且量能維持（RV>0.8x）→ 加至全倉",check:null},
    ];
  }else if(decision==="加倉至全倉"){
    actionSteps=[
      {icon:"✓",text:"第二週確認：週漲>2%，量能維持",check:true},
      {icon:"1",text:`本週執行：追加 Long LEAPS 至全倉（再買$8,000），行權價 $${strike1}–$${strike2}`,check:null},
      {icon:"2",text:"全倉後禁止賣 Short Call，讓 LEAPS 完整參與趨勢",check:null},
      {icon:"3",text:`站上週線EMA20（$${md.ema20.toFixed(0)}）= 趨勢完全確認`,check:md.aboveE20},
    ];
  }else if(decision==="持有半倉觀察"){
    actionSteps=[
      {icon:"○",text:"本週不加倉，量能不足（RV<0.8x），維持半倉",check:null},
      {icon:"2",text:`繼續監控：下週若放量（RV>0.8x）+ 漲>2% → 加至全倉`,check:null},
      {icon:"3",text:`止損線仍有效：跌破第一週最低點立即出場`,check:null},
    ];
  }else if(decision==="止損出場"){
    actionSteps=[
      {icon:"!",text:"跌破第一週最低點，假信號保護觸發",check:false},
      {icon:"1",text:"下週開盤立即賣出 LEAPS，不猶豫",check:null},
      {icon:"2",text:"出場後持有SGOV，重新等待下一個底部信號",check:null},
      {icon:"3",text:"損失控制在-2%至-5%，保護本金",check:null},
    ];
  }else if(decision==="評估離場"||decision==="頂部警戒"){
    actionSteps=[
      {icon:"!",text:decision==="評估離場"?"頂部確認，下週開盤執行離場":"高位量縮，進入警戒狀態",check:false},
      {icon:"2",text:decision==="評估離場"?"不等更高點，確認即行動":"監控MACD Histogram是否急縮>50%",check:null},
      {icon:"3",text:"離場後持有SGOV，等待下一個底部週期",check:null},
    ];
  }else if(decision==="持倉讓跑"){
    actionSteps=[
      {icon:"○",text:"本週不需要任何操作",check:true},
      {icon:"2",text:`監控：若週線跌破EMA20（$${md.ema20.toFixed(0)}）才需重新評估`,check:null},
      {icon:"3",text:"禁止賣 Short Call，趨勢向上中段不干擾",check:null},
    ];
  }else if(decision==="謹慎持有"){
    actionSteps=[
      {icon:"1",text:`高位警示：百分位${md.histPct}%，注意量縮信號（RV<0.7x）`,check:false},
      {icon:"2",text:"不加倉，監控KDJ超買和MACD Histogram走向",check:null},
      {icon:"3",text:"出現頂部確認條件即行動，不猶豫",check:null},
    ];
  }else if(decision==="收租觀察"){
    const scStrike=Math.round(md.price*1.05/5)*5;
    actionSteps=[
      {icon:"1",text:`週線橫盤，可考慮賣保守 Short Call：行權價 $${scStrike}+，Delta 0.15–0.20`,check:null},
      {icon:"2",text:"確認無頂部警示，緩衝>5%才執行",check:null},
      {icon:"3",text:`週線跌破EMA20（$${md.ema20.toFixed(0)}）立即重新評估`,check:null},
    ];
  }else{
    actionSteps=[
      {icon:"○",text:"本週不執行任何操作",check:true},
      {icon:"2",text:`空倉持有SGOV，等待週線底部信號（週漲>3%+RV>1.2，或週內V型反彈>5%）`,check:null},
      {icon:"3",text:`關注週線EMA20位置（$${md.ema20.toFixed(0)}）作為支撐參考`,check:null},
    ];
  }

  return{
    position:{label:posLabel,color:posColor,pct:p},
    structure:{label:strLabel,color:strColor,detail:strDetail},
    momentum:{label:momLabel,color:momColor,score:momScore},
    decision,decColor,decDetail,actionSteps,positionSize,
    condCount,
    isBottomSignalA,isBottomSignalB,isBottomSignalC,
    isTopReversal,isUptrend,isDowntrend,
    isFakeSignal,isTopWarningVol,isTopConfirm,
    isWeek1Signal,isWeek2Confirm,
  };
}

async function fetchNews(){
  const sources=[
    "https://corsproxy.io/?"+encodeURIComponent("https://feeds.finance.yahoo.com/rss/2.0/headline?s=QQQ&region=US&lang=en-US"),
    "https://api.allorigins.win/raw?url="+encodeURIComponent("https://feeds.finance.yahoo.com/rss/2.0/headline?s=QQQ&region=US&lang=en-US"),
  ];
  for(const url of sources){
    try{
      const r=await fetch(url,{signal:AbortSignal.timeout(6000)});
      if(!r.ok)continue;
      const txt=await r.text();
      const parser=new DOMParser();
      const doc=parser.parseFromString(txt,"text/xml");
      const items=doc.querySelectorAll("item");
      if(!items.length)continue;
      const headlines=Array.from(items).slice(0,6).map(item=>{
        const title=item.querySelector("title")?.textContent||"";
        const pubDate=item.querySelector("pubDate")?.textContent||"";
        return`${title}(${pubDate.substring(0,16)})`;
      }).filter(h=>h.length>5);
      if(headlines.length>0)return headlines.join("\n");
    }catch{continue;}
  }
  return null;
}

async function askClaude(md,trend,positions,ctx,week2State){
  const hasLeaps=positions.some(p=>p.type==="long");
  const hasHalf=positions.some(p=>p.type==="long"&&p.qty===0.5);

  const posTxt=positions.length===0?"目前空倉。":
    positions.map(p=>{
      if(p.type==="long"){
        const pnl=(p.current-p.cost)*100*p.qty;
        const pct=((p.current-p.cost)/p.cost*100).toFixed(1);
        return`Long LEAPS QQQ ${p.expiry} ${p.strike}C×${p.qty}，成本$${p.cost}，現值$${p.current}，浮盈$${pnl.toFixed(0)}（${pct}%），Delta ${p.delta}`;
      }else{
        const pnl=(p.sell-p.current)*100*p.qty;
        const buf=((p.strike-md.price)/md.price*100).toFixed(1);
        return`Short Call QQQ ${p.expiry} ${p.strike}C×${p.qty}，賣出$${p.sell}，現值$${p.current}，緩衝${buf}%`;
      }
    }).join("\n");

  let newsSection="";

  const week2Note=week2State?`\n【上週狀態】已半倉進場，本週是第二週確認週。`:"";

  const prompt=`今天是${today}（週線分析）。

【週線三層分析】
第一層 歷史位置：${trend.position.label}（52週百分位${trend.position.pct}%）
  距52週高點${md.fromHi52.toFixed(1)}%，距52週低點+${md.fromLo52.toFixed(1)}%

第二層 趨勢結構：${trend.structure.label}
  ${trend.structure.detail}
  站穩週線EMA20（$${md.ema20.toFixed(0)}）：${md.aboveE20?"是":"否"}
  週線連漲：${md.wk2Up?"是":"否"}，月漲幅：${md.monthly.toFixed(1)}%

第三層 動能：${trend.momentum.label}（${trend.momentum.score}/4）
  週MACD ${md.macd.toFixed(2)}（${md.macdExp?"擴張":"收窄"}），Hist ${md.histNow.toFixed(2)}

        <div style={{textAlign:"right"}}>
          <div style={{fontSize:11,color:C.muted,fontFamily:"'JetBrains Mono',monospace"}}>{ds}</div>
          <div style={{fontSize:10,marginTop:2,fontFamily:"'JetBrains Mono',monospace",
            color:hasLeaps?week2State?C.amber:C.green:C.gold}}>
            {hasLeaps?week2State?"½ 半倉":"全倉持有":"空倉"}
          </div>
        </div>
      </div>

      <div style={{display:"flex",background:"#0d1018",borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
        {[["today","本週任務"],["positions","持倉"],["add","新增"]].map(([id,lbl])=>(
          <div key={id} onClick={()=>setTab(id)}
            style={{flex:1,padding:"13px 8px",textAlign:"center",fontSize:13,
              fontWeight:tab===id?700:400,color:tab===id?C.gold:C.muted,
              borderBottom:tab===id?`2px solid ${C.gold}`:"2px solid transparent",
              cursor:"pointer",letterSpacing:0.5}}>
            {lbl}
          </div>
        ))}
      </div>

      <div style={{flex:1,overflow:"hidden"}}>
        {tab==="today"&&todayPage}
        {tab==="positions"&&posPage}
        {tab==="add"&&addPage}
      </div>

      <div style={{background:"rgba(7,9,12,0.97)",backdropFilter:"blur(12px)",
        borderTop:`1px solid ${C.border}`,display:"flex",flexShrink:0,
        paddingBottom:"env(safe-area-inset-bottom,0)"}}>
        {[{id:"today",icon:"🎯",l:"本週"},{id:"positions",icon:"📊",l:"持倉"},{id:"add",icon:"＋",l:"新增"}].map(n=>(
          <button key={n.id} onClick={()=>setTab(n.id)}
            style={{flex:1,padding:"12px 8px",display:"flex",flexDirection:"column",alignItems:"center",
              gap:4,background:"none",border:"none",cursor:"pointer"}}>
            <div style={{fontSize:20,opacity:tab===n.id?1:0.3}}>{n.icon}</div>
            <div style={{fontSize:9,letterSpacing:1,textTransform:"uppercase",
              fontFamily:"'JetBrains Mono',monospace",
              color:tab===n.id?C.gold:C.muted,fontWeight:tab===n.id?700:400}}>{n.l}</div>
          </button>
        ))}
      </div>

      {toast&&(
        <div style={{position:"fixed",bottom:90,left:"50%",transform:"translateX(-50%)",
          background:C.surf,border:`1px solid ${C.border2}`,borderRadius:6,
          padding:"10px 18px",fontSize:12,color:C.text,zIndex:200,whiteSpace:"nowrap",
          fontFamily:"'JetBrains Mono',monospace"}}>{toast}</div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
