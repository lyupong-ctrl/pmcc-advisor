// ── Storage ───────────────────────────────────────────────────────────────────
function load(){try{return JSON.parse(localStorage.getItem(KEY)||"{}")}catch{return{}}}
function save(d){localStorage.setItem(KEY,JSON.stringify(d))}
function loadPos(){try{return load().positions||[]}catch{return[]}}
function savePos(p){const s=load();s.positions=p;save(s)}
function loadWeek2(){try{return load().week2||null}catch{return null}}
function saveWeek2(w){const s=load();s.week2=w;save(s)}
function loadLastDecision(){try{return load().lastDecision||null}catch{return null}}
function saveLastDecision(d){const s=load();s.lastDecision=d;save(s)}
function loadHistHistory(){try{return load().histHistory||[]}catch{return[]}}
function saveHistHistory(h){const s=load();s.histHistory=h.slice(-4);save(s)}
// 週五基準決策儲存
function loadWeeklyBase(){try{return load().weeklyBase||null}catch{return null}}
function saveWeeklyBase(b){const s=load();s.weeklyBase=b;save(s)}

function calcEMA(data,n){
  if(data.length<n)return[data.at(-1)||0];
  const k=2/(n+1);
  let e=data.slice(0,n).reduce((a,b)=>a+b,0)/n;
  const r=[e];
  for(let i=n;i<data.length;i++){e=data[i]*k+e*(1-k);r.push(e)}
  return r;
}

// ── 數據源：全部透過 Cloudflare Worker（解決CORS問題）──────────────────────
// Worker 路由：
//   POST /          → Claude API
//   GET  /market/weekly   → Polygon 週線
//   GET  /market/daily    → Polygon 日線
//   GET  /market/snapshot → Polygon 即時快照

async function workerFetch(path){
  const r=await fetch(WORKER_URL+path,{signal:AbortSignal.timeout(12000)});
  if(!r.ok)throw new Error(`Worker ${path} HTTP ${r.status}`);
  const d=await r.json();
  if(!d.ok){
    if(d.error==="rate_limit")throw new Error("⏱ Polygon API 頻率超限，請等1分鐘後重試");
    throw new Error(d.error||d.message||`Worker ${path} 回傳錯誤`);
  }
  return d;
}

// ── 週線數據（週五分析用）────────────────────────────────────────────────────
async function fetchWeeklyMarket(){
  const wd=await workerFetch("/market/weekly");
  const wkBars=wd.results; // [{o,h,l,c,v,t}]，t為Unix ms
  if(wkBars.length<30)throw new Error("週線數據不足");

  const now=new Date();
  const dow=now.getDay();
  const dayNames=["日","一","二","三","四","五","六"];
  const todayLabel=`週${dayNames[dow]}`;

  // 判斷最後一根K是否為本週未收盤
  const lastBar=wkBars.at(-1);
  const lastBarDate=new Date(lastBar.t);
  const daysSince=Math.floor((now-lastBarDate)/86400000);
  const isOpen=daysSince<5&&dow>=1&&dow<=5;

  // 主分析切片：未收盤用上週，已收盤用本週
  const mainBars=isOpen?wkBars.slice(0,-1):wkBars;
  const cl=mainBars.map(b=>b.c);
  const vl=mainBars.map(b=>b.v);
  const ll=mainBars.map(b=>b.l);

  const cur=cl.at(-1),prev=cl.at(-2),prev2=cl.at(-3);
  const weeklyChg=(cur-prev)/prev*100;
  const weeklyChgPrev=(prev-prev2)/prev2*100;
  const mo4=cl.at(-5)||cl[0];
  const monthly=(cur-mo4)/mo4*100;
  const yr=cl.slice(-52);
  const hi52=Math.max(...yr),lo52=Math.min(...yr);
  const fromHi52=(cur-hi52)/hi52*100;
  const fromLo52=(cur-lo52)/lo52*100;
  const histPct=Math.round((cur-lo52)/(hi52-lo52)*100);
  const e5=calcEMA(cl,5),e10=calcEMA(cl,10),e20=calcEMA(cl,20),e40=calcEMA(cl,40);
  const distE20=(cur-e20.at(-1))/e20.at(-1)*100;
  const e12=calcEMA(cl,12),e26=calcEMA(cl,26);
  const macdLine=cl.map((_,i)=>{
    const i12=Math.max(0,e12.length-cl.length+i);
    const i26=Math.max(0,e26.length-cl.length+i);
    return(e12[i12]||0)-(e26[i26]||0);
  });
  const macdNow=e12.at(-1)-e26.at(-1);
  const macdPrev=e12.at(-2)-e26.at(-2);
  const sig9=calcEMA(macdLine,9);
  const histNow=macdNow-sig9.at(-1);
  const histPrev=macdPrev-sig9.at(-2);
  const avgVol20=vl.slice(-20).reduce((a,b)=>a+b,0)/20;
  const volRatio=avgVol20>0?vl.at(-1)/avgVol20:1;
  const weekIntraSwing=(cur-ll.at(-1))/ll.at(-1)*100;
  const wk2Up=cur>prev&&prev>prev2;
  const wk3Up=cur>prev&&prev>prev2&&(cl.at(-4)!=null?prev2>cl.at(-4):true);
  const wk2Down=cur<prev&&prev<prev2;

  // 本週即時補充
  let thisWeek=null;
  if(isOpen){
    const tw=wkBars.at(-1);
    const prevClose=mainBars.at(-1).c;

    let dayRV=null,snap=null;
    try{
      const [dd,sd]=await Promise.all([
        workerFetch("/market/daily").catch(()=>null),
        workerFetch("/market/snapshot").catch(()=>null),
      ]);
      if(dd?.results){
        const dv=dd.results.map(b=>b.v).filter(v=>v>0);
        const dayAvg=dv.slice(-21,-1).reduce((a,b)=>a+b,0)/20;
        // snapshot ok:false（免費tier）時用週K成交量估算
        const todayVol=(sd?.ok&&sd?.volume)||tw.v;
        dayRV=dayAvg>0?todayVol/dayAvg:null;
      }
      // 只在 ok:true 且有 price 時才用快照（免費tier回傳 ok:false）
      if(sd?.ok&&sd?.price)snap=sd;
    }catch{}

    const livePrice=snap?.price||tw.c;
    const chg=(livePrice-prevClose)/prevClose*100;
    thisWeek={
      price:livePrice,chg,
      high:snap?.high||tw.h,
      low:snap?.low||tw.l,
      dayLabel:todayLabel,
      volRatio:dayRV!=null?dayRV:(avgVol20>0?tw.v/avgVol20:null),
      volRatioSource:snap?.price?"即時快照":(dayRV!=null?"日線均量":"週線估算"),
      updatedAt:snap?.updatedAt||"歷史收盤",
    };
  }

  const histArr=[
    macdLine.at(-4)-(calcEMA(macdLine,9).at(-4)||0),
    macdLine.at(-3)-(calcEMA(macdLine,9).at(-3)||0),
    histPrev,histNow,
  ];

  return{
    price:cur,prev,weekly:weeklyChg,weeklyPrev:weeklyChgPrev,monthly,
    hi52,lo52,fromHi52,fromLo52,histPct,
    ema5:e5.at(-1),ema10:e10.at(-1),ema20:e20.at(-1),ema40:e40.at(-1),distE20,
    macd:macdNow,macdPrev,macdExp:macdNow>macdPrev,
    histNow,histPrev,histShrink:histPrev!==0?Math.abs((histNow-histPrev)/histPrev)*100:0,
    histArr,volRatio,weekIntraSwing,
    wk2Up,wk3Up,wk2Down,
    aboveE20:cur>e20.at(-1),aboveE40:cur>e40.at(-1),
    monthTrend:cur>e20.at(-1)?"up":cur<e20.at(-1)*0.97?"down":"flat",
    thisWeek,isCurrentWeekOpen:isOpen,todayLabel,
  };
}

// ── 日線數據（每日分析用）────────────────────────────────────────────────────
async function fetchDailyMarket(){
  // 同時抓歷史日K（計算技術指標）+ Yahoo即時報價（今日現價）
  const [dd,live]=await Promise.all([
    workerFetch("/market/daily"),
    fetch(WORKER_URL+"/market/live",{signal:AbortSignal.timeout(8000)})
      .then(r=>r.json()).catch(()=>null),
  ]);
  const dayBars=dd.results;
  if(dayBars.length<20)throw new Error("日線數據不足");

  const cl=dayBars.map(b=>b.c);
  const vl=dayBars.map(b=>b.v);
  const now=new Date();
  const dayNames=["日","一","二","三","四","五","六"];
  const todayLabel=`週${dayNames[now.getDay()]}`;

  // 即時數據（優先用Yahoo即時，fallback用Polygon最新日K）
  const liveOk=live?.ok&&live?.price;
  const latestBar=dayBars.at(-1);
  const livePrice=liveOk?live.price:latestBar.c;
  const liveOpen=liveOk?live.open:latestBar.o;
  const liveHigh=liveOk?live.high:latestBar.h;
  const liveLow=liveOk?live.low:latestBar.l;
  const liveVol=liveOk?live.volume:latestBar.v;
  const prevClose=liveOk?live.prevClose:cl.at(-2);

  const dailyChg=prevClose?(livePrice-prevClose)/prevClose*100:0;
  // RV：今日成交量 ÷ 近20日均量（用Polygon歷史數據計算，準確）
  const avgVol20=vl.slice(-21,-1).reduce((a,b)=>a+b,0)/20;
  const dayRV=avgVol20>0?liveVol/avgVol20:1;
  const e20d=calcEMA(cl,20);
  const aboveE20d=livePrice>e20d.at(-1);
  const hi10=Math.max(...cl.slice(-9),livePrice);
  const lo10=Math.min(...cl.slice(-9),livePrice);

  const body=Math.abs(livePrice-liveOpen);
  const range=liveHigh-liveLow;
  const candleType=range<0.01?"無量":
    body/range>0.6?(livePrice>liveOpen?"實體陽線":"實體陰線"):
    livePrice>liveOpen?"上影陽線":"下影陰線";

  return{
    price:livePrice,prev:prevClose,daily:dailyChg,dayRV,
    high:liveHigh,low:liveLow,open:liveOpen,
    e20d:e20d.at(-1),aboveE20d,
    hi10,lo10,candleType,todayLabel,
    isMarketOpen:live?.isMarketOpen||false,
    updatedAt:live?.updatedAt||"歷史收盤",
    dataSource:liveOk?"Yahoo即時":"Polygon日K",
  };
}

// ── 新聞抓取 ──────────────────────────────────────────────────────────────────
async function fetchNews(){
  const sources=[
    "https://corsproxy.io/?"+encodeURIComponent("https://feeds.finance.yahoo.com/rss/2.0/headline?s=QQQ&region=US&lang=en-US"),
    "https://api.allorigins.win/raw?url="+encodeURIComponent("https://feeds.finance.yahoo.com/rss/2.0/headline?s=QQQ&region=US&lang=en-US"),
  ];
  for(const url of sources){
    try{
      const r=await fetch(url,{signal:AbortSignal.timeout(6000)});
      if(!r.ok)continue;
      const txt=await r.text();
      const doc=new DOMParser().parseFromString(txt,"text/xml");
      const items=doc.querySelectorAll("item");
      if(!items.length)continue;
      const headlines=Array.from(items).slice(0,8).map(item=>{
        const title=item.querySelector("title")?.textContent||"";
        const pub=item.querySelector("pubDate")?.textContent||"";
        return`${title}(${pub.substring(0,16)})`;
      }).filter(h=>h.length>5);
      if(headlines.length)return headlines.join("\n");
    }catch{continue;}
  }
  return null;
}

// ── 週線分析邏輯 ──────────────────────────────────────────────────────────────
function analyzeTrend(md,week2State){
  const p=md.histPct;
  let posLabel,posColor;
  if(p>=80){posLabel="歷史高位區";posColor="red";}
  else if(p>=55){posLabel="中高位區";posColor="amber";}
  else if(p>=30){posLabel="中間位置";posColor="blue";}
  else{posLabel="歷史低位區";posColor="green";}

  const isBottomSignalA=md.weekly>3&&md.volRatio>1.2;
  const isBottomSignalC=md.weekIntraSwing>5;
  const isBottomSignalB=md.weekly>2&&md.weeklyPrev>2;
  const hasBottomSignal=isBottomSignalA||isBottomSignalC||isBottomSignalB;
  const isUptrend=md.aboveE20&&md.macd>0&&md.wk2Up;
  const isDowntrend=!md.aboveE20&&md.macd<0&&md.wk2Down;
  const isTopReversal=p>80&&md.wk2Down&&md.monthly<-5;
  const isFakeSignal=md.volRatio>2.5&&Math.abs(md.weekly)<1;
  const isTopWarningVol=p>80&&md.volRatio<0.7;
  const histShrinkBig=md.histNow<0||(md.histPrev>0&&md.histShrink>50);
  const isTopConfirm=md.weekly<-1.5&&md.volRatio>1.0&&histShrinkBig;

  let strLabel,strColor,strDetail;
  if(hasBottomSignal&&p<55){strLabel="底部反轉信號";strColor="green";strDetail=`週漲${md.weekly.toFixed(1)}%，RV=${md.volRatio.toFixed(2)}x，底部放量反彈`;}
  else if(isTopReversal){strLabel="頂部反轉警示";strColor="red";strDetail=`週線連跌，月跌${Math.abs(md.monthly).toFixed(1)}%`;}
  else if(isUptrend){strLabel="上升趨勢持續";strColor="amber";strDetail="站穩週線EMA20，MACD偏多，週線連漲";}
  else if(isDowntrend){strLabel="下跌趨勢中";strColor="red";strDetail="跌破週線EMA20，MACD偏空";}
  else{strLabel="趨勢整理中";strColor="blue";strDetail="EMA20附近整理，等待方向確認";}

  const momScore=(md.macdExp?1:0)+(md.volRatio>1.0?1:0)+(md.weekly>2?1:0)+(md.distE20>2?1:0);
  const momLabel=momScore>=3?"強勁":momScore>=2?"溫和":"疲弱";
  const momColor=momScore>=3?"green":momScore>=2?"amber":"red";

  const isWeek1Signal=hasBottomSignal&&p<60&&!isFakeSignal;
  const isWeek2Confirm=week2State&&md.weekly>2&&md.volRatio>0.8;
  const isWeek2Weak=week2State&&md.weekly>2&&md.volRatio<=0.8;
  const isWeek2StopLoss=week2State&&md.weekly<-2;
  const cond1=p<35,cond2=md.wk3Up,cond3=md.aboveE20,cond4=md.monthly>5,cond5=md.fromLo52>8;
  const condCount=[cond1,cond2,cond3,cond4,cond5].filter(Boolean).length;

  let decision,decColor,decDetail,positionSize="";
  if(isFakeSignal){decision="假信號警告";decColor="red";decDetail="量價背離：大量推不動價格，不進場";}
  else if(isTopConfirm||isTopReversal){decision="評估離場";decColor="red";decDetail="頂部確認信號，次週開盤執行離場";}
  else if(isWeek2StopLoss){decision="止損出場";decColor="red";decDetail="第二週跌破第一週低點，假信號保護觸發";}
  else if(isWeek2Confirm){decision="加倉至全倉";decColor="green";decDetail="第二週確認：週漲>2%且量能維持，加至全倉";positionSize="全倉";}
  else if(isWeek2Weak){decision="持有半倉觀察";decColor="amber";decDetail="第二週縮量上漲，量能不足，維持半倉繼續觀察";positionSize="半倉";}
  else if(isWeek1Signal&&condCount>=3){decision="半倉建倉";decColor="green";decDetail=`底部信號出現（${condCount}/5確認條件），半倉試探進場`;positionSize="半倉";}
  else if(isUptrend&&p<75&&md.distE20<10){decision="持倉讓跑";decColor="gold";decDetail="週線上升趨勢中段，讓LEAPS完整參與，禁止Short Call";}
  else if(isUptrend&&(p>=75||md.distE20>=10)){decision="謹慎持有";decColor="amber";decDetail="接近高位或過度拉伸，監控頂部警示條件";}
  else if(isTopWarningVol){decision="頂部警戒";decColor="amber";decDetail="高位量縮，頂部警示之一，進入警戒狀態";}
  else if(!md.aboveE20&&Math.abs(md.weekly)<1.5){decision="收租觀察";decColor="blue";decDetail="週線橫盤整理，可考慮保守Short Call";}
  else{decision="觀察等待";decColor="muted";decDetail="週線信號不明確，持有SGOV等待底部信號";}

  const strike1=Math.round(md.price*0.80/5)*5;
  const strike2=Math.round(md.price*0.85/5)*5;
  let actionSteps=[];
  if(decision==="半倉建倉"){
    actionSteps=[
      {icon:"!",text:`本週收盤出現底部信號（${condCount}/5確認條件）`,check:null},
      {icon:"1",text:`下週開盤：買入 Long LEAPS 半倉（$8,000），行權價 $${strike1}–$${strike2}，到期 12–18 個月`,check:null},
      {icon:"2",text:`止損線：本週最低點跌破即出場`,check:null},
      {icon:"3",text:"下週若再漲>2%且RV>0.8x → 加至全倉",check:null},
    ];
  }else if(decision==="加倉至全倉"){
    actionSteps=[
      {icon:"✓",text:"第二週確認：週漲>2%，量能維持",check:true},
      {icon:"1",text:`執行：追加 Long LEAPS 至全倉（再買$8,000），行權價 $${strike1}–$${strike2}`,check:null},
      {icon:"2",text:"全倉後禁止賣 Short Call",check:null},
      {icon:"3",text:`站上週線EMA20（$${md.ema20.toFixed(0)}）= 趨勢完全確認`,check:md.aboveE20},
    ];
  }else if(decision==="持有半倉觀察"){
    actionSteps=[
      {icon:"○",text:"本週不加倉，量能不足（RV<0.8x），維持半倉",check:null},
      {icon:"2",text:"下週若放量（RV>0.8x）+ 漲>2% → 加至全倉",check:null},
      {icon:"3",text:"止損線仍有效：跌破第一週最低點立即出場",check:null},
    ];
  }else if(decision==="止損出場"){
    actionSteps=[
      {icon:"!",text:"跌破第一週最低點，假信號保護觸發",check:false},
      {icon:"1",text:"下週開盤立即賣出 LEAPS，不猶豫",check:null},
      {icon:"2",text:"出場後持有SGOV，重新等待底部信號",check:null},
    ];
  }else if(decision==="評估離場"||decision==="頂部警戒"){
    actionSteps=[
      {icon:"!",text:decision==="評估離場"?"頂部確認，下週開盤執行離場":"高位量縮，進入警戒狀態",check:false},
      {icon:"2",text:decision==="評估離場"?"不等更高點，確認即行動":"監控MACD Histogram是否急縮>50%",check:null},
      {icon:"3",text:"離場後持有SGOV，等待下一個底部週期",check:null},
    ];
  }else if(decision==="持倉讓跑"){
    actionSteps=[
      {icon:"○",text:"本週不需要任何操作",check:true},
      {icon:"2",text:`監控：若跌破週EMA20（$${md.ema20.toFixed(0)}）才需重新評估`,check:null},
      {icon:"3",text:"禁止賣 Short Call，趨勢向上中段不干擾",check:null},
    ];
  }else if(decision==="謹慎持有"){
    actionSteps=[
      {icon:"1",text:`高位警示：百分位${p}%，注意量縮信號（RV<0.7x）`,check:false},
      {icon:"2",text:"不加倉，監控KDJ超買和MACD Histogram走向",check:null},
      {icon:"3",text:"出現頂部確認條件即行動，不猶豫",check:null},
    ];
  }else if(decision==="收租觀察"){
    const scStrike=Math.round(md.price*1.05/5)*5;
    actionSteps=[
      {icon:"1",text:`週線橫盤，可考慮賣保守 Short Call：行權價 $${scStrike}+，Delta 0.15–0.20`,check:null},
      {icon:"2",text:"確認無頂部警示，緩衝>5%才執行",check:null},
      {icon:"3",text:`跌破EMA20（$${md.ema20.toFixed(0)}）立即重新評估`,check:null},
    ];
  }else{
    actionSteps=[
      {icon:"○",text:"本週不執行任何操作",check:true},
      {icon:"2",text:`空倉持有SGOV，等待週線底部信號`,check:null},
      {icon:"3",text:`關注週線EMA20（$${md.ema20.toFixed(0)}）作為支撐參考`,check:null},
    ];
  }

  return{
    position:{label:posLabel,color:posColor,pct:p},
    structure:{label:strLabel,color:strColor,detail:strDetail},
    momentum:{label:momLabel,color:momColor,score:momScore},
    decision,decColor,decDetail,actionSteps,positionSize,condCount,
    isBottomSignalA,isBottomSignalB,isBottomSignalC,
    isTopReversal,isUptrend,isDowntrend,
    isFakeSignal,isTopWarningVol,isTopConfirm,
    isWeek1Signal,isWeek2Confirm,
  };
}

async function askClaudeWeekly(md,trend,positions,week2State){

function parseAnalysis(text){
  if(!text)return[];
  const segs=[];
  const lines=text.split("\n").filter(l=>l.trim());
  let cur=null;
  const hdrs=["第一層","第二層","第三層","第四層","第五層","下週操作計劃","今日市場解讀","與基準對比","今日重要信號","明日預判","一句話結論"];
  for(const line of lines){
    const h=hdrs.find(h=>line.startsWith(h));
    if(h){if(cur)segs.push(cur);cur={title:line.trim(),body:[]};}
    else if(cur){cur.body.push(line.trim());}
    else{segs.push({title:null,body:[line.trim()]});}
  }
  if(cur)segs.push(cur);
  return segs;
}

function AnalysisBlock({text,source}){
  const segs=parseAnalysis(text);
  return(
    <div>
      {segs.map((seg,i)=>{
        const isConclusion=seg.title&&seg.title.includes("一句話結論");
        const isAction=seg.title&&(seg.title.includes("操作計劃")||seg.title.includes("重要信號"));
        return(
          <div key={i} style={{marginBottom:16}}>
            {seg.title&&(
              <div style={{fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:8,
                fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase",
                color:isConclusion?C.gold:isAction?C.green:C.dim}}>
                {seg.title}
              </div>
            )}
            <div style={{
              background:isConclusion?"rgba(240,165,0,0.06)":isAction?"rgba(0,200,150,0.04)":"transparent",
              borderLeft:isConclusion?`3px solid ${C.gold}`:isAction?`3px solid ${C.green}`:"none",
              borderRadius:isConclusion||isAction?6:0,
              padding:isConclusion||isAction?"10px 14px":0,
            }}>
              {seg.body.map((line,j)=>(
                <div key={j} style={{fontSize:13,color:isConclusion?C.text:C.dim,
                  lineHeight:1.8,fontWeight:isConclusion?700:400,marginBottom:4}}>
                  {line}
                </div>
              ))}
            </div>
          </div>
        );
      })}
      {source==="offline"&&(
        <div style={{fontSize:10,color:C.muted,fontFamily:"'JetBrains Mono',monospace",
          marginTop:8,padding:"6px 10px",background:C.surf2,borderRadius:4}}>
          ⚠️ AI連線失敗，以上為離線分析
        </div>
      )}
    </div>
  );
}

                ))}
              </div>
              {/* Histogram 4週趨勢圖 */}
              <div style={{background:C.surf2,borderRadius:5,padding:"8px 10px"}}>
                <div style={{fontSize:9,color:C.muted,marginBottom:8,
                  fontFamily:"'JetBrains Mono',monospace",letterSpacing:1}}>
                  MACD HISTOGRAM 趨勢（近4週）
                </div>
                {(()=>{
                  const hist=histHistory.length>=2?histHistory:[wmd.histPrev,wmd.histNow];
                  const maxAbs=Math.max(...hist.map(h=>Math.abs(h||0)),0.001);
                  const shrinkPct=hist.length>=2&&hist.at(-2)!==0
                    ?Math.abs((hist.at(-1)-hist.at(-2))/hist.at(-2))*100:0;
                  const isShrinking=hist.at(-1)<hist.at(-2);
                  const labels=hist.length===4?["-3週","-2週","上週","本週"]:
                    hist.length===3?["-2週","上週","本週"]:["-1週","本週"];
                  return(
                    <div>
                      <div style={{display:"flex",alignItems:"flex-end",gap:4,height:40,marginBottom:6}}>
                        {hist.map((h,i)=>{
                          const pct=Math.abs(h||0)/maxAbs;
                          const isPos=(h||0)>=0;
                          const isLast=i===hist.length-1;
                          return(
                            <div key={i} style={{flex:1,display:"flex",flexDirection:"column",
                              alignItems:"center",justifyContent:"flex-end",height:"100%"}}>
                              <div style={{
                                width:"100%",height:`${Math.max(pct*36,2)}px`,
                                background:isPos?(isLast?C.green:"rgba(0,200,150,0.4)"):(isLast?C.red:"rgba(245,64,74,0.4)"),
                                borderRadius:2,border:isLast?`1px solid ${isPos?C.green:C.red}`:"none",
                              }}/>
                            </div>
                          );
                        })}
                      </div>
                      <div style={{display:"flex",gap:4}}>
                        {hist.map((h,i)=>(
                          <div key={i} style={{flex:1,textAlign:"center",fontSize:8,
                            color:C.muted,fontFamily:"'JetBrains Mono',monospace"}}>{labels[i]||""}</div>
                        ))}
                      </div>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:6}}>
                        <div style={{fontSize:11,fontWeight:700,
                          color:(wmd.histNow||0)>0?C.green:C.red,fontFamily:"'JetBrains Mono',monospace"}}>
                          {(wmd.histNow||0).toFixed(3)}
                        </div>
                        <div style={{fontSize:10,
                          color:shrinkPct>50?C.red:shrinkPct>25?C.amber:C.muted,
                          fontFamily:"'JetBrains Mono',monospace"}}>
                          {isShrinking?`↓收窄${shrinkPct.toFixed(0)}%`:`↑擴張${shrinkPct.toFixed(0)}%`}
                        </div>
                      </div>
                    </div>
                  );
                })()}
              </div>
              {/* 本週截至今日補充 */}
              {wmd.thisWeek&&(
                <div style={{marginTop:8,background:"rgba(96,165,250,0.06)",
                  border:"1px solid rgba(96,165,250,0.15)",borderRadius:5,padding:"8px 10px"}}>
                  <div style={{fontSize:9,color:C.blue,marginBottom:6,
                    fontFamily:"'JetBrains Mono',monospace",letterSpacing:1}}>
                    本週截至{wmd.todayLabel}（未收盤，僅供參考）
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                    {[
                      {l:"今日價格",v:`$${wmd.thisWeek.price.toFixed(2)}`,sub:`本週${wmd.thisWeek.chg>=0?"+":""}${wmd.thisWeek.chg.toFixed(1)}%`},
                      {l:"今日RV",v:wmd.thisWeek.volRatio!=null?`${wmd.thisWeek.volRatio.toFixed(2)}x`:"—",sub:wmd.thisWeek.volRatioSource||""},
                    ].map(d=>(
                      <div key={d.l}>
                        <div style={{fontSize:9,color:C.muted,marginBottom:2}}>{d.l}</div>
                        <div style={{fontSize:13,fontWeight:700,color:C.blue,fontFamily:"'JetBrains Mono',monospace"}}>{d.v}</div>
                        <div style={{fontSize:9,color:C.muted}}>{d.sub}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </LayerCard>

            {/* 空倉建倉參考 */}
            {!hasLeaps&&(
              <div style={{background:C.surf3,border:`1px solid ${C.border}`,borderRadius:10,padding:"14px",marginTop:4}}>
                <div style={{fontSize:10,color:C.gold,letterSpacing:2,fontFamily:"'JetBrains Mono',monospace",
                  marginBottom:10,fontWeight:700}}>LEAPS 建倉參考</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  {[
                    {l:"半倉行權價",v:`$${Math.round(wmd.price*0.82/5)*5}–$${Math.round(wmd.price*0.85/5)*5}`,s:"現價80-85%，Delta≈0.75"},
                    {l:"半倉資金",v:"$8,000",s:"第一週信號，等第二週確認"},
                    {l:"到期日",v:"12–18 個月",s:"低位選18個月緩衝充足"},
                    {l:"週EMA20",v:`$${wmd.ema20.toFixed(0)}`,s:"站穩此位=趨勢確認"},
                  ].map(d=>(
                    <div key={d.l} style={{background:C.surf2,borderRadius:6,padding:"10px 12px"}}>
                      <div style={{fontSize:9,color:C.muted,marginBottom:4}}>{d.l}</div>
                      <div style={{fontSize:14,fontWeight:700,color:C.text}}>{d.v}</div>
                      <div style={{fontSize:10,color:C.muted,marginTop:2,lineHeight:1.4}}>{d.s}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );

  // ── POSITIONS PAGE ─────────────────────────────────────────────────────────
  const posPage=(
    <div style={{padding:"14px 14px 24px",overflowY:"auto",height:"100%"}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
        <div style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:8,padding:"14px 12px"}}>
          <div style={{fontSize:10,color:C.muted,marginBottom:6,fontFamily:"'JetBrains Mono',monospace"}}>組合淨值</div>
          <div style={{fontSize:24,fontWeight:900,
            color:netPnl>0?C.green:netPnl<0?C.red:C.gold}}>
            {netPnl>=0?"+":""}${Math.abs(netPnl).toFixed(0)}
          </div>
        </div>
        <div style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:8,padding:"14px 12px"}}>
          <div style={{fontSize:10,color:C.muted,marginBottom:6,fontFamily:"'JetBrains Mono',monospace"}}>持倉狀態</div>
          <div style={{fontSize:16,fontWeight:900,color:hasLeaps?week2State?C.amber:C.green:C.gold}}>
            {hasLeaps?week2State?"½ 半倉":"全倉":"空倉"}
          </div>
        </div>
      </div>
      <SL ch="當前持倉" mt={4}/>
      {positions.length===0?(
        <div style={{textAlign:"center",padding:"48px 20px",color:C.muted,fontSize:13,lineHeight:2.2}}>
          尚未新增持倉<br/>前往「新增」頁面
        </div>
      ):positions.map(p=>{
        const pnl=p.type==="long"?(p.current-p.cost)*100*p.qty:(p.sell-p.current)*100*p.qty;
        const pct=p.type==="long"?((p.current-p.cost)/p.cost*100):((p.sell-p.current)/p.sell*100);
        let ac=C.green,am="";
        if(p.type==="long"){am=`持有中 · Delta ${p.delta} · 每漲$10賺$${(p.delta*1000*p.qty).toFixed(0)}`;}
        else{
          const buf=wmd?((p.strike-wmd.price)/wmd.price*100).toFixed(1):null;
          if(buf!==null&&+buf<2){ac=C.red;am=`🔴 緩衝僅${buf}%，評估Roll`;}
          else{am=`50%獲利$${(p.sell*0.5).toFixed(2)} · 停損$${(p.sell*2).toFixed(2)}`;}
        }
        return(
          <div key={p.id} style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:10,padding:"16px 14px",marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
              <div>
                <div style={{fontSize:10,fontWeight:700,letterSpacing:1.5,padding:"3px 8px",borderRadius:4,
                  display:"inline-block",fontFamily:"'JetBrains Mono',monospace",
                  background:p.type==="long"?C.greenDim:C.redDim,color:p.type==="long"?C.green:C.red,
                  border:`1px solid ${p.type==="long"?C.greenB:C.redB}`}}>
                  {p.type==="long"?`LONG LEAPS${p.qty<1?" ½":""}` :"SHORT CALL"}
                </div>
                <div style={{fontSize:15,fontWeight:700,color:C.text,marginTop:7,fontFamily:"'JetBrains Mono',monospace"}}>
                  QQQ {p.expiry} {p.strike}C × {p.qty}
                </div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:24,fontWeight:900,color:pnl>=0?C.green:C.red}}>
                  {pnl>=0?"+":""}${Math.abs(pnl).toFixed(0)}
                </div>
                <div style={{fontSize:11,color:C.muted,fontFamily:"'JetBrains Mono',monospace"}}>
                  {pnl>=0?"+":""}{pct.toFixed(1)}%
                </div>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginBottom:10}}>
              {[
                {l:p.type==="long"?"成本":"賣出價",v:`$${p.type==="long"?p.cost:p.sell}`},
                {l:"現值",v:`$${p.current}`},
                {l:"Delta",v:String(p.delta)},
              ].map(d=>(
                <div key={d.l} style={{background:C.surf2,borderRadius:6,padding:"8px 10px"}}>
                  <div style={{fontSize:9,color:C.muted,marginBottom:4}}>{d.l}</div>
                  <div style={{fontSize:13,fontWeight:600,color:C.text,fontFamily:"'JetBrains Mono',monospace"}}>{d.v}</div>
                </div>
              ))}
            </div>
            <div style={{padding:"9px 12px",borderRadius:6,fontSize:12,fontFamily:"'JetBrains Mono',monospace",
              borderLeft:`3px solid ${ac}`,background:`${ac}10`,color:ac}}>{am}</div>
            <button onClick={()=>{savePosState(positions.filter(x=>x.id!==p.id));showToast("已刪除");}}
              style={{width:"100%",marginTop:10,padding:"8px",background:"transparent",
                border:`1px solid ${C.border}`,borderRadius:6,color:C.muted,fontSize:11,cursor:"pointer"}}>
              刪除此倉位
            </button>
          </div>
        );
      })}
    </div>
  );

  // ── ADD PAGE ───────────────────────────────────────────────────────────────
  const addPage=(
    <div style={{padding:"14px 14px 24px",overflowY:"auto",height:"100%"}}>
      <div style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:10,padding:"18px 14px",marginBottom:12}}>
        <div style={{fontSize:12,color:C.gold,letterSpacing:2,textTransform:"uppercase",
          marginBottom:14,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>新增倉位</div>
        <div style={{display:"flex",gap:8,marginBottom:16}}>
          {["long","short"].map(t=>(
            <button key={t} onClick={()=>setForm(f=>({...f,type:t}))}
              style={{flex:1,padding:"11px",borderRadius:6,cursor:"pointer",fontSize:13,fontWeight:700,
                border:form.type===t?`1px solid ${C.gold}`:`1px solid ${C.border}`,
                background:form.type===t?C.goldDim:"transparent",
                color:form.type===t?C.gold:C.muted}}>
              {t==="long"?"Long LEAPS":"Short Call"}
            </button>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
          {[
            {k:"strike",l:"行權價",p:"515"},
            {k:"expiry",l:"到期日 YYMMDD",p:"270117"},
            {k:form.type==="long"?"cost":"sell",l:form.type==="long"?"買入成本":"賣出價格",p:"124.72"},
            {k:"current",l:"現值",p:"226.05"},
            {k:"delta",l:"Delta",p:"0.75"},
            {k:"qty",l:"張數（半倉填0.5）",p:"0.5"},
          ].map(f=>(
            <div key={f.k}>
              <div style={{fontSize:10,color:C.muted,marginBottom:6,fontFamily:"'JetBrains Mono',monospace"}}>{f.l}</div>
              <input type="number" step="any" placeholder={f.p} value={form[f.k]||""}
                onChange={e=>setForm(prev=>({...prev,[f.k]:e.target.value}))}
                style={{width:"100%",background:C.surf2,border:`1px solid ${C.border2}`,borderRadius:6,
                  padding:"12px",color:C.text,fontSize:15,fontWeight:700,outline:"none"}}/>
            </div>
          ))}
        </div>
        <button onClick={addPos}
          style={{width:"100%",padding:15,background:`linear-gradient(135deg,${C.gold},#c8841a)`,
            border:"none",borderRadius:8,color:"#000",fontSize:14,fontWeight:900,letterSpacing:2,cursor:"pointer"}}>
          新增
        </button>
      </div>
      <div style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:8,padding:"14px"}}>
        <div style={{fontSize:10,color:C.muted,letterSpacing:1,marginBottom:10,
          fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase"}}>填寫提示</div>
        {["半倉進場時張數填 0.5，全倉填 1","到期日格式：270117 = 2027年01月17日","現值每週更新讓 P&L 保持準確"].map((t,i)=>(
          <div key={i} style={{fontSize:12,color:C.dim,paddingLeft:12,position:"relative",marginBottom:6}}>
            <span style={{position:"absolute",left:0,color:C.muted}}>·</span>{t}
          </div>
        ))}
      </div>
    </div>
  );

  return(
    <div style={{background:C.bg,maxWidth:430,margin:"0 auto",display:"flex",flexDirection:"column",
      height:"100dvh",overflow:"hidden"}}>
      <div style={{background:"rgba(7,9,12,0.97)",backdropFilter:"blur(12px)",
        padding:"16px 16px 12px",borderBottom:`1px solid ${C.border}`,
        display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0,
        paddingTop:"max(16px,env(safe-area-inset-top,16px))"}}>
        <div>
          <div style={{fontSize:18,fontWeight:900,color:C.text,letterSpacing:1}}>PMCC ADVISOR</div>
          <div style={{fontSize:10,color:C.muted,marginTop:2,letterSpacing:1,
            fontFamily:"'JetBrains Mono',monospace"}}>週線策略 v3.0</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:11,color:C.muted,fontFamily:"'JetBrains Mono',monospace"}}>{ds}</div>
          <div style={{fontSize:10,marginTop:2,fontFamily:"'JetBrains Mono',monospace",
            color:hasLeaps?week2State?C.amber:C.green:C.gold}}>
            {hasLeaps?week2State?"½ 半倉":"全倉持有":"空倉"}
          </div>
        </div>
      </div>

      <div style={{display:"flex",background:"#0d1018",borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
        {[["today","分析"],["positions","持倉"],["add","新增"]].map(([id,lbl])=>(
          <div key={id} onClick={()=>setTab(id)}
            style={{flex:1,padding:"13px 8px",textAlign:"center",fontSize:13,
              fontWeight:tab===id?700:400,color:tab===id?C.gold:C.muted,
              borderBottom:tab===id?`2px solid ${C.gold}`:"2px solid transparent",
              cursor:"pointer",letterSpacing:0.5}}>
            {lbl}
          </div>
        ))}
      </div>

      <div style={{flex:1,overflow:"hidden"}}>
        {tab==="today"&&todayPage}
        {tab==="positions"&&posPage}
        {tab==="add"&&addPage}
      </div>

      <div style={{background:"rgba(7,9,12,0.97)",backdropFilter:"blur(12px)",
        borderTop:`1px solid ${C.border}`,display:"flex",flexShrink:0,
        paddingBottom:"env(safe-area-inset-bottom,0)"}}>
        {[{id:"today",icon:"🎯",l:"分析"},{id:"positions",icon:"📊",l:"持倉"},{id:"add",icon:"＋",l:"新增"}].map(n=>(
          <button key={n.id} onClick={()=>setTab(n.id)}
            style={{flex:1,padding:"12px 8px",display:"flex",flexDirection:"column",alignItems:"center",
              gap:4,background:"none",border:"none",cursor:"pointer"}}>
            <div style={{fontSize:20,opacity:tab===n.id?1:0.3}}>{n.icon}</div>
            <div style={{fontSize:9,letterSpacing:1,textTransform:"uppercase",
              fontFamily:"'JetBrains Mono',monospace",
              color:tab===n.id?C.gold:C.muted,fontWeight:tab===n.id?700:400}}>{n.l}</div>
          </button>
        ))}
      </div>

      {toast&&(
        <div style={{position:"fixed",bottom:90,left:"50%",transform:"translateX(-50%)",
          background:C.surf,border:`1px solid ${C.border2}`,borderRadius:6,
          padding:"10px 18px",fontSize:12,color:C.text,zIndex:200,whiteSpace:"nowrap",
          fontFamily:"'JetBrains Mono',monospace"}}>{toast}</div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
